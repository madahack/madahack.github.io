<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADAHACK — Cybersécurité Madagascar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 800px; }
    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .mada { color: #fff; }
    .hack { color: #007E3A; }
    .tagline {
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .tagline .red { color: #FC3D32; }
    .tagline .green { color: #007E3A; }
    .soon {
      font-size: 1.2rem;
      color: #ccc;
      margin-top: 2rem;
    }
    .blink {
      display: inline-block;
      animation: blink 1s infinite;
      color: #007E3A;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="mada">MADA</span><span class="hack">HACK</span></h1>
    <p class="tagline">
      <span class="red">HACK</span> · 
      <span class="green">DEFEND</span> · 
      <span>SECURE</span>
    </p>
    <p class="soon">
      &gt; Site en construction<span class="blink">_</span>
    </p>
  </div>
</body>
</html>
